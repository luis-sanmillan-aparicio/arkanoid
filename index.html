<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>NEON BREAKOUT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  
  #wrapper, #wrapper * {
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  
  canvas {
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  :root{
    --neon-cyan:#00f5ff;
    --neon-pink:#ff006e;
    --neon-yellow:#ffbe0b;
    --neon-green:#06ffa5;
    --neon-purple:#8338ec;
    --bg:#050510;
    --grid:#0a0a2a;
  }
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:var(--bg);
    font-family:'Orbitron',monospace;
    color:#fff;
    touch-action:none;
  }

  #wrapper{
    width:100%;
    height: 100vh;
    height: 100dvh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;
    padding-top:max(env(safe-area-inset-top), 8px);
    padding-bottom:0;
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }

  #canvas-wrap{
    position:relative;
    width:100%;max-width:420px;
    flex:1;
    min-height:0;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }

  #hud{
    width:100%;max-width:420px;
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 16px 6px;
    position:relative;z-index:10;
  }
  .hud-item{text-align:center;}
  .hud-label{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-transform:uppercase;}
  .hud-val{font-size:20px;font-weight:900;color:var(--neon-cyan);text-shadow:0 0 12px var(--neon-cyan);}
  #level-val{color:var(--neon-pink);text-shadow:0 0 12px var(--neon-pink);}
  #lives-val{color:var(--neon-yellow);text-shadow:0 0 12px var(--neon-yellow);}

  canvas{
    display:block;
    width:100%;height:100%;
    image-rendering:pixelated;
  }

  .overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(5,5,16,0.92);
    z-index:20;gap:20px;
    backdrop-filter:blur(4px);
  }
  .overlay.hidden{display:none;}

  .big-title{
    font-size:clamp(28px,8vw,48px);font-weight:900;
    letter-spacing:4px;text-align:center;
    background:linear-gradient(135deg,var(--neon-cyan),var(--neon-pink));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 20px rgba(0,245,255,0.5));
    line-height:1.1;
  }
  .sub-title{font-size:13px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-align:center;}
  .big-btn{
    padding:14px 40px;border:2px solid var(--neon-cyan);
    background:rgba(0,245,255,0.08);
    color:var(--neon-cyan);font-family:'Orbitron',monospace;
    font-size:14px;font-weight:700;letter-spacing:3px;
    cursor:pointer;border-radius:4px;
    text-shadow:0 0 8px var(--neon-cyan);
    box-shadow:0 0 20px rgba(0,245,255,0.2),inset 0 0 20px rgba(0,245,255,0.05);
    transition:all 0.2s;
  }
  .big-btn:active{transform:scale(0.95);background:rgba(0,245,255,0.18);}
  .big-btn.pink{
    border-color:var(--neon-pink);color:var(--neon-pink);
    text-shadow:0 0 8px var(--neon-pink);
    box-shadow:0 0 20px rgba(255,0,110,0.2),inset 0 0 20px rgba(255,0,110,0.05);
    background:rgba(255,0,110,0.08);
  }

  .powerup-legend{
    display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
    font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.5);
  }
  .pu-item{display:flex;align-items:center;gap:5px;}
  .pu-dot{width:10px;height:10px;border-radius:2px;}

  #msg{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:clamp(20px,6vw,32px);font-weight:900;
    letter-spacing:3px;text-align:center;
    pointer-events:none;z-index:15;
    opacity:0;transition:opacity 0.3s;
    text-shadow:0 0 20px currentColor;
  }
  #msg.show{opacity:1;}
</style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="score-val">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Level</div>
      <div class="hud-val" id="level-val">1</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Lives</div>
      <div class="hud-val" id="lives-val">❤</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="msg"></div>

    <!-- START -->
    <div class="overlay" id="ov-start">
      <div class="big-title">NEON<br>BREAKOUT</div>
      <div class="sub-title">DESLIZA PARA MOVER • TOCA PARA LANZAR LÁSER</div>
      <div class="powerup-legend">
        <div class="pu-item"><div class="pu-dot" style="background:#06ffa5"></div>+Vida</div>
        <div class="pu-item"><div class="pu-dot" style="background:#ffbe0b"></div>Paleta+</div>
        <div class="pu-item"><div class="pu-dot" style="background:#ff006e"></div>Bola x2</div>
        <div class="pu-item"><div class="pu-dot" style="background:#ff69b4"></div>Bola x3</div>
        <div class="pu-item"><div class="pu-dot" style="background:#00f5ff"></div>⚡Laser x20</div>
        <div class="pu-item"><div class="pu-dot" style="background:#00f5ff"></div>Fuego</div>
        <div class="pu-item"><div class="pu-dot" style="background:#ff4500"></div>💥Implacable</div>
        <div class="pu-item"><div class="pu-dot" style="background:#ff2200"></div>🚀Misil</div>
        <div class="pu-item"><div class="pu-dot" style="background:#ff2200"></div>🛡Barrera</div>
        <div class="pu-item"><div class="pu-dot" style="background:#888"></div>💀Trampa</div>
      </div>
      <button class="big-btn" id="btn-start">JUGAR</button>
    </div>

    <!-- GAME OVER -->
    <div class="overlay hidden" id="ov-over">
      <div class="big-title">GAME<br>OVER</div>
      <div class="hud-val" id="final-score" style="font-size:28px"></div>
      <button class="big-btn pink" id="btn-restart">REINTENTAR</button>
    </div>

    <!-- WIN -->
    <div class="overlay hidden" id="ov-win">
      <div class="big-title" style="font-size:clamp(22px,6vw,36px)">¡NIVEL<br>SUPERADO!</div>
      <div class="hud-val" id="win-score" style="font-size:24px"></div>
      <button class="big-btn" id="btn-next">SIGUIENTE ▶</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

function resize(){
  const hudH = document.getElementById('hud').getBoundingClientRect().height;
  const totalH = window.innerHeight;
  const wrapH = totalH - hudH;
  wrap.style.height = wrapH + 'px';
  const r = wrap.getBoundingClientRect();
  canvas.width = r.width;
  canvas.height = r.height;
  if(game) game.onResize();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize, 200));

const BRICK_COLORS = [
  ['#ff006e','#ff5599'],
  ['#ff6b00','#ff9955'],
  ['#ffbe0b','#ffdd77'],
  ['#06ffa5','#66ffcc'],
  ['#00f5ff','#88ffff'],
  ['#8338ec','#bb88ff'],
];

const PU_TYPES = [
  {id:'life',        color:'#06ffa5', label:'❤'},
  {id:'wide',        color:'#ffbe0b', label:'▬'},
  {id:'multi',       color:'#ff006e', label:'×2'},
  {id:'five',        color:'#ff69b4', label:'×3'},
  {id:'laser',       color:'#00f5ff', label:'⚡'},
  {id:'unstoppable', color:'#ff4500', label:'💥'},
  {id:'unstoppable', color:'#ff4500', label:'💥'},
  {id:'missile',     color:'#ff2200', label:'🚀'},
  {id:'barrier',     color:'#ff2200', label:'🛡'},
  {id:'skull',       color:'#888888', label:'💀'},
];

class Particle{
  constructor(x,y,color){
    this.x=x; this.y=y; this.color=color;
    const a = Math.random()*Math.PI*2;
    const s = 1.5+Math.random()*4;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=1; this.decay=0.03+Math.random()*0.04;
    this.r=2+Math.random()*3;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.1;this.life-=this.decay;}
  draw(ctx){
    ctx.globalAlpha=this.life;
    ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

class Laser{
  constructor(x,y){this.x=x;this.y=y;this.vy=-12;this.w=3;this.h=16;}
  update(){this.y+=this.vy;}
  draw(ctx){
    ctx.shadowBlur=10;ctx.shadowColor='#00f5ff';
    ctx.fillStyle='#00f5ff';
    ctx.fillRect(this.x-this.w/2,this.y,this.w,this.h);
    ctx.shadowBlur=0;
  }
}

class Powerup{
  constructor(x,y,type){
    this.x=x;this.y=y;this.type=type;
    this.w=32;this.h=18;this.vy=2;this.alive=true;
  }
  update(){this.y+=this.vy;}
  draw(ctx){
    const pu=PU_TYPES.find(p=>p.id===this.type);
    ctx.shadowBlur=12;ctx.shadowColor=pu.color;
    ctx.fillStyle=pu.color+'44';
    ctx.strokeStyle=pu.color;ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.roundRect(this.x-this.w/2,this.y-this.h/2,this.w,this.h,4);
    ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.font='bold 10px Orbitron,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pu.label,this.x,this.y);
  }
}

class Ball{
  constructor(x,y,vx,vy,r=7){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.r=r;
    this.alive=true; this.trail=[];
  }
  update(W,H){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>8) this.trail.shift();
    this.x+=this.vx; this.y+=this.vy;
    if(this.x-this.r<0){this.x=this.r;this.vx=Math.abs(this.vx);}
    if(this.x+this.r>W){this.x=W-this.r;this.vx=-Math.abs(this.vx);}
    if(this.y-this.r<0){this.y=this.r;this.vy=Math.abs(this.vy);}
    if(this.y>H+20) this.alive=false;
  }
  draw(ctx){
    const trailColor = this.unstoppable ? '#ff4500' : '#00f5ff';
    this.trail.forEach((p,i)=>{
      const a=(i/this.trail.length)*0.4;
      const r=this.r*(i/this.trail.length)*0.8;
      ctx.globalAlpha=a;
      ctx.fillStyle=trailColor;
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    ctx.shadowBlur=this.unstoppable?28:20;
    ctx.shadowColor=trailColor;
    ctx.fillStyle=this.unstoppable?'#ffaa44':'#fff';
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
}

class Game{
  constructor(){
    this.W=canvas.width; this.H=canvas.height;
    this.level=1; this.score=0; this.lives=1;
    this.state='playing';
    this.particles=[];
    this.powerups=[];
    this.lasers=[];
    this.laserActive=false;
    this.laserShots=0;
    this.unstoppable=false;
    this.unstoppableTimer=0;
    this.skullSpawnedThisLevel=false;
    this.lifeSpawnedThisLevel=false;
    // Misil
    this.missileQueue=0;
    this.missileActive=false; // misil en vuelo
    this.missileObj=null;
    this.missileParticles=[];
    this.explosionObj=null;
    // Barrera
    this.barrierActive=false;
    this.barrierTimer=0;
    this.initLevel();
  }

  onResize(){
    this.W=canvas.width; this.H=canvas.height;
    this.initPaddle();
    this.placeBricks();
    this.balls.forEach(b=>{
      if(b.stuck){b.x=this.paddle.x+this.paddle.w/2; b.y=this.paddle.y-b.r-1;}
    });
  }

  initLevel(){
    this.W=canvas.width; this.H=canvas.height;
    this.balls=[];
    this.powerups=[];
    this.lasers=[];
    this.laserActive=false;
    this.laserShots=0;
    this.unstoppable=false;
    this.unstoppableTimer=0;
    this.skullSpawnedThisLevel=false;
    this.lifeSpawnedThisLevel=false;
    this.missileQueue=0;
    this.missileActive=false;
    this.missileObj=null;
    this.missileParticles=[];
    this.explosionObj=null;
    this.barrierActive=false;
    this.barrierTimer=0;
    this.initPaddle();
    this.placeBricks();
    const speed = 4+this.level*0.4;
    const b=new Ball(this.paddle.x+this.paddle.w/2, this.paddle.y-8, 0, -speed);
    b.stuck=true; b.baseSpeed=speed;
    this.balls=[b];
  }

  initPaddle(){
    const pw=Math.min(90, this.W*0.28);
    this.paddle={
      x:this.W/2-pw/2, y:this.H-this.H*0.1,
      w:pw, h:10, baseW:pw,
      wideTimer:0,
    };
  }

  placeBricks(){
    this.bricks=[];
    const cols=8, rows=3+Math.min(this.level,5);
    const padX=12, padY=this.H*0.08+40;
    const gap=4;
    const bw=(this.W-padX*2-gap*(cols-1))/cols;
    const bh=Math.min(18,this.H*0.04);
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const ci=Math.floor((r/rows)*BRICK_COLORS.length);
        this.bricks.push({
          x:padX+c*(bw+gap), y:padY+r*(bh+gap),
          w:bw, h:bh,
          hp:1, maxHp:1,
          color:BRICK_COLORS[ci],
          alive:true,
        });
      }
    }
  }

  onPointerMove(clientX){
    const rect=canvas.getBoundingClientRect();
    const x=(clientX-rect.left)*(canvas.width/rect.width);
    this.paddle.x=Math.max(0,Math.min(this.W-this.paddle.w, x-this.paddle.w/2));
    this.balls.forEach(b=>{if(b.stuck) b.x=this.paddle.x+this.paddle.w/2;});
  }

  onTap(){
    let released=false;
    this.balls.forEach(b=>{
      if(b.stuck){
        b.stuck=false;
        const angle=-Math.PI/2+(Math.random()-0.5)*0.5;
        b.vx=Math.cos(angle)*b.baseSpeed;
        b.vy=Math.sin(angle)*b.baseSpeed;
        released=true;
      }
    });


    if(!released && this.missileQueue>0 && !this.missileActive){
      this.missileActive=true;
      this.missileQueue--;
      const BALL_R=7;
      this.missileObj={
        x:this.paddle.x+this.paddle.w/2,
        y:this.paddle.y-BALL_R*2,
        vy:-10, alive:true, trail:[], smokeT:0,
      };
    } else if(!released && this.laserActive){
      this.lasers.push(new Laser(this.paddle.x+6, this.paddle.y));
      this.lasers.push(new Laser(this.paddle.x+this.paddle.w-6, this.paddle.y));
      this.laserShots--;
      if(this.laserShots<=0){ this.laserActive=false; this.laserShots=0; }
    }



    
    
    
  }

  spawnParticles(x,y,color,n=8){
    for(let i=0;i<n;i++) this.particles.push(new Particle(x,y,color));
  }

  dropPowerup(br){
    let pool = PU_TYPES.filter(p => {
      if(p.id==='skull' && this.skullSpawnedThisLevel) return false;
      if(p.id==='life' && (this.level%3!==0 || this.lifeSpawnedThisLevel)) return false;
      return true;
    });
    pool = pool.filter(p => {
      if(p.id==='life' || p.id==='skull') return true;
      return Math.random()<0.25;
    });
    if(!pool.length) return;
    const pt = pool[Math.floor(Math.random()*pool.length)];
    if(pt.id==='skull') this.skullSpawnedThisLevel=true;
    if(pt.id==='life') this.lifeSpawnedThisLevel=true;
    this.powerups.push(new Powerup(br.x+br.w/2, br.y+br.h/2, pt.id));
  }

  applyPowerup(type){
    const p=this.paddle;
    switch(type){
      case 'life': this.lives=Math.min(10,this.lives+1); this.updateHUD(); this.showMsg('+VIDA ❤','#06ffa5'); break;
      case 'skull':
        this.lives--;
        this.updateHUD();
        this.showMsg('💀 -1 VIDA','#888');
        if(this.lives<=0){this.state='over';}
        break;
      case 'wide':
        p.w=Math.min(this.W*0.5, p.baseW*1.7);
        p.wideTimer=400; break;
      case 'multi':{
        const newBalls=[];
        this.balls.forEach(b=>{
          if(!b.stuck){
            newBalls.push(new Ball(b.x,b.y,-b.vx,b.vy,b.r));
          }
        });
        this.balls.push(...newBalls.slice(0,2)); break;
      }
      case 'five':{
        const ref=this.balls.find(b=>!b.stuck)||this.balls[0];
        if(ref){
          const speed=Math.hypot(ref.vx,ref.vy)||5;
          for(let i=0;i<2;i++){
            const angle=-Math.PI/2+(i-0.5)*0.6;
            const nb=new Ball(ref.x,ref.y,Math.cos(angle)*speed,Math.sin(angle)*speed,ref.r);
            nb.unstoppable=ref.unstoppable||false;
            this.balls.push(nb);
          }
        }
        this.showMsg('×3 BOLAS!','#ff69b4'); break;
      }
      case 'laser':
        this.laserActive=true;
        this.laserShots=(this.laserShots||0)+20;
        this.showMsg('⚡ LASER ×20','#00f5ff'); break;
      case 'unstoppable':
        this.unstoppable=true; this.unstoppableTimer=600;
        this.balls.forEach(b=>b.unstoppable=true);
        this.showMsg('¡IMPLACABLE!','#ff4500'); break;
      case 'missile':
        this.missileQueue++;
        this.showMsg('🚀 MISIL DESTRUCTOR','#ff2200'); break;
      case 'barrier':
        this.barrierActive=true;
        this.barrierTimer=900;
        this.showMsg('🛡 BARRERA PROTECTORA','#ff2200'); break;
    }
  }

  doMissileExplosion(ex,ey){
    const BW=(this.W-12*2-4*(8-1))/8;
    const m=this.missileObj;
    m.alive=false;
    this.missileActive=false;
    this.explosionObj={x:ex,y:ey,t:0,duration:90,radius:BW*1.7};
    for(let i=0;i<80;i++){
      const a=(i/80)*Math.PI*2;
      const spd=2+Math.random()*8;
      const cols=['#ffffff','#ffffa0','#ffcc00','#ff8800','#ff4400','#cc1100'];
      const col=cols[Math.floor(Math.random()*cols.length)];
      this.missileParticles.push({
        x:ex,y:ey,
        vx:Math.cos(a)*spd*(0.7+Math.random()*0.6),
        vy:Math.sin(a)*spd*(0.7+Math.random()*0.6),
        r:2+Math.random()*4, life:1,
        decay:1/(30+Math.random()*25),
        smoke:false, color:col,
      });
    }
    for(let i=0;i<50;i++){
      const a=Math.random()*Math.PI*2;
      const spd=10+Math.random()*14;
      this.missileParticles.push({
        x:ex,y:ey,
        vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
        r:1+Math.random()*1.2, life:1,
        decay:1/(12+Math.random()*10),
        smoke:false, color:'#ffee88',
      });
    }
    this.showMsg('💥 BOOM!','#ff4400');
  }

  update(){
    if(this.state!=='playing') return;
    const {W,H,paddle}=this;

    if(paddle.wideTimer>0){paddle.wideTimer--;if(paddle.wideTimer===0) paddle.w=paddle.baseW;}
    if(this.unstoppableTimer>0){this.unstoppableTimer--;if(this.unstoppableTimer===0){this.unstoppable=false;this.balls.forEach(b=>b.unstoppable=false);}}

    // Barrera
    if(this.barrierActive){
      this.barrierTimer--;
      if(this.barrierTimer<=0){this.barrierActive=false;}
      // Rebote de bolas en la barrera
      this.balls.forEach(b=>{
        if(b.stuck) return;
        const by=paddle.y+paddle.h/2;
        if(b.vy>0 && b.y+b.r>=by && b.y-b.r<=by+4){
          b.y=by-b.r;
          b.vy=-Math.abs(b.vy);
        }
      });
    }

    // Misil
    if(this.missileObj && this.missileObj.alive){
      const m=this.missileObj;
      const BALL_R=7, MW=BALL_R*2;
      m.trail.push({x:m.x,y:m.y});
      if(m.trail.length>20) m.trail.shift();
      m.y+=m.vy;
      m.smokeT++;
      // Partículas de propulsión
      if(m.smokeT%2===0){
        this.missileParticles.push({
          x:m.x+(Math.random()*4-2), y:m.y+MW,
          vx:Math.random()*0.6-0.3, vy:-0.4+Math.random()*0.2,
          r:2+Math.random()*2, life:1, decay:0.04, smoke:true,
        });
      }
      if(m.smokeT%3===0){
        const a=Math.PI/2+(Math.random()*0.5-0.25);
        this.missileParticles.push({
          x:m.x, y:m.y+MW,
          vx:Math.cos(a)*(1.5+Math.random()*2.5),
          vy:Math.sin(a)*(1.5+Math.random()*2.5),
          r:1.5, life:1, decay:0.12, smoke:false, color:'#ffcc44',
        });
      }
      // Colisión con ladrillo
      let hit=false;
      for(let br of this.bricks){
        if(!br.alive) continue;
        if(m.x+MW/2>br.x && m.x-MW/2<br.x+br.w &&
           m.y-MW*2<br.y+br.h && m.y>br.y-MW){
          hit=true;
          this.doMissileExplosion(m.x, br.y+br.h/2);
          break;
        }
      }
      if(!hit && m.y<-40){ m.alive=false; this.missileActive=false; }
      // Partículas del misil
      this.missileParticles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.life-=p.decay; p.r*=0.97;
        if(!p.smoke) p.vy+=0.15;
      });
      this.missileParticles=this.missileParticles.filter(p=>p.life>0);
    } else if(this.missileObj && !this.missileObj.alive){
      // Partículas de explosión siguen vivas tras el misil muerto
      this.missileParticles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.life-=p.decay; p.r*=0.97;
        if(!p.smoke) p.vy+=0.15;
      });
      this.missileParticles=this.missileParticles.filter(p=>p.life>0);
      if(this.missileParticles.length===0) this.missileObj=null;
    }

    // Explosión del misil
    if(this.explosionObj){
      const ex=this.explosionObj;
      ex.t++;
      const currentR=ex.radius*Math.min(1,ex.t/(ex.duration*0.6));
      this.bricks.forEach(br=>{
        if(!br.alive) return;
        const bcx=br.x+br.w/2, bcy=br.y+br.h/2;
        if(Math.hypot(bcx-ex.x,bcy-ex.y)<=currentR+br.w*0.4){
          br.alive=false;
          this.score+=10*this.level; this.updateHUD();
          this.spawnParticles(bcx,bcy,br.color[0],10);
        }
      });
      if(ex.t>ex.duration) this.explosionObj=null;
    }

    this.balls.forEach(b=>{
      if(b.stuck) return;
      b.update(W,H);
      if(b.vy>0 && b.y+b.r>=paddle.y && b.y-b.r<=paddle.y+paddle.h
        && b.x>=paddle.x && b.x<=paddle.x+paddle.w){
        b.y=paddle.y-b.r;
        const hit=(b.x-(paddle.x+paddle.w/2))/(paddle.w/2);
        const angle=-Math.PI/2+hit*0.8;
        const speed=Math.hypot(b.vx,b.vy);
        b.vx=Math.cos(angle)*speed;
        b.vy=Math.sin(angle)*speed;
        const maxS=10+this.level*0.3;
        const s=Math.hypot(b.vx,b.vy);
        if(s>maxS){b.vx=b.vx/s*maxS;b.vy=b.vy/s*maxS;}
      }
      this.bricks.forEach(br=>{
        if(!br.alive) return;
        if(b.x+b.r>br.x && b.x-b.r<br.x+br.w && b.y+b.r>br.y && b.y-b.r<br.y+br.h){
          if(b.unstoppable){
            br.hp=0; br.alive=false;
            this.score+=10*this.level;
            this.updateHUD();
            this.spawnParticles(br.x+br.w/2,br.y+br.h/2,br.color[0],14);
            if(Math.random()<0.20) this.dropPowerup(br);
          } else {
            br.hp--;
            if(br.hp<=0){
              br.alive=false;
              this.score+=10*this.level;
              this.updateHUD();
              this.spawnParticles(br.x+br.w/2,br.y+br.h/2,br.color[0]);
              if(Math.random()<0.20) this.dropPowerup(br);
            } else {
              this.spawnParticles(br.x+br.w/2,br.y+br.h/2,br.color[0],4);
            }
            const overlapL=b.x+b.r-br.x, overlapR=br.x+br.w-(b.x-b.r);
            const overlapT=b.y+b.r-br.y, overlapB=br.y+br.h-(b.y-b.r);
            const minH=Math.min(overlapL,overlapR), minV=Math.min(overlapT,overlapB);
            if(minH<minV) b.vx=-b.vx; else b.vy=-b.vy;
          }
        }
      });
    });

    this.balls=this.balls.filter(b=>b.alive||b.stuck);
    if(this.balls.length===0){
      this.lives--;
      this.updateHUD();
      if(this.lives<=0){this.state='over';return;}
      const speed=4+this.level*0.4;
      const b=new Ball(paddle.x+paddle.w/2,paddle.y-8,0,-speed);
      b.stuck=true;b.baseSpeed=speed;
      this.balls=[b];
      this.showMsg('PERDISTE UNA VIDA','#ff006e');
    }

    this.powerups.forEach(pu=>{
      pu.update();
      if(pu.y+pu.h/2>paddle.y && pu.y-pu.h/2<paddle.y+paddle.h
        && pu.x>paddle.x && pu.x<paddle.x+paddle.w){
        this.applyPowerup(pu.type);
        this.spawnParticles(pu.x,pu.y,PU_TYPES.find(p=>p.id===pu.type).color,12);
        pu.alive=false;
      }
      if(pu.y>H+30) pu.alive=false;
    });
    this.powerups=this.powerups.filter(p=>p.alive);

    this.lasers.forEach(l=>{
      l.update();
      this.bricks.forEach(br=>{
        if(!br.alive) return;
        if(l.x>br.x && l.x<br.x+br.w && l.y<br.y+br.h && l.y+l.h>br.y){
          br.hp=0;br.alive=false;
          this.score+=5*this.level;this.updateHUD();
          this.spawnParticles(br.x+br.w/2,br.y+br.h/2,br.color[0]);
          l.alive=false;
        }
      });
      if(l.y<-20) l.alive=false;
    });
    this.lasers=this.lasers.filter(l=>l.alive!==false);

    this.particles.forEach(p=>p.update());
    this.particles=this.particles.filter(p=>p.life>0);

    if(this.bricks.every(b=>!b.alive)){this.state='won';}
  }

  draw(){
    const {W,H,paddle}=this;
    ctx.fillStyle=`#050510`;
    ctx.fillRect(0,0,W,H);

    ctx.strokeStyle='rgba(0,245,255,0.04)';ctx.lineWidth=1;
    const gs=30;
    for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    this.bricks.forEach(br=>{
      if(!br.alive) return;
      const alpha=0.4+0.6*(br.hp/br.maxHp);
      ctx.globalAlpha=alpha;
      const grad=ctx.createLinearGradient(br.x,br.y,br.x,br.y+br.h);
      grad.addColorStop(0,br.color[1]);grad.addColorStop(1,br.color[0]);
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.roundRect(br.x+1,br.y+1,br.w-2,br.h-2,3);ctx.fill();
      ctx.globalAlpha=alpha*0.8;
      ctx.strokeStyle=br.color[1];ctx.lineWidth=1;
      ctx.shadowBlur=8;ctx.shadowColor=br.color[0];
      ctx.stroke();ctx.shadowBlur=0;
      if(br.hp<br.maxHp){
        ctx.globalAlpha=0.5;
        ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=1.5;
        for(let i=0;i<br.maxHp-br.hp;i++){
          ctx.beginPath();
          ctx.moveTo(br.x+br.w*0.2+i*8,br.y+2);
          ctx.lineTo(br.x+br.w*0.3+i*8,br.y+br.h-2);
          ctx.stroke();
        }
      }
      ctx.globalAlpha=1;
    });

    this.powerups.forEach(p=>p.draw(ctx));
    this.lasers.forEach(l=>l.draw(ctx));

    // Barrera protectora
    if(this.barrierActive){
      const by=paddle.y+paddle.h/2;
      const alpha=this.barrierTimer<360?(this.barrierTimer/360):1;
      ctx.save();
      ctx.globalAlpha=0.7*alpha;
      ctx.strokeStyle='#ff2200';
      ctx.lineWidth=2;
      ctx.shadowBlur=10; ctx.shadowColor='#ff2200';
      ctx.beginPath(); ctx.moveTo(0,by); ctx.lineTo(W,by); ctx.stroke();
      ctx.restore();
      ctx.globalAlpha=1;
    }

    // Partículas del misil (humo debajo, fuego encima)
    if(this.missileParticles.length){
      this.missileParticles.filter(p=>p.smoke).forEach(p=>{
        ctx.globalAlpha=p.life*0.22;
        ctx.fillStyle='#aaaaaa';
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      });
      this.missileParticles.filter(p=>!p.smoke).forEach(p=>{
        ctx.globalAlpha=p.life*0.9;
        ctx.shadowBlur=p.r*2; ctx.shadowColor=p.color||'#ffcc44';
        ctx.fillStyle=p.color||'#ffcc44';
        ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.3,p.r),0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      });
      ctx.globalAlpha=1;
    }

    // Explosión del misil
    if(this.explosionObj){
      const ex=this.explosionObj;
      const prog=Math.min(1,ex.t/ex.duration);
      const cx=ex.x, cy=ex.y;
      // Resplandor
      if(prog<0.75){
        const gr=ex.radius*1.5*(1-prog*0.65);
        const g0=ctx.createRadialGradient(cx,cy,0,cx,cy,gr);
        g0.addColorStop(0,`rgba(255,140,0,${0.18*(1-prog)})`);
        g0.addColorStop(1,'rgba(255,30,0,0)');
        ctx.fillStyle=g0; ctx.beginPath();ctx.arc(cx,cy,gr,0,Math.PI*2);ctx.fill();
      }
      // Bola de fuego
      const coreR=Math.max(0,ex.radius*0.6*(1-Math.pow(prog,1.15)));
      if(coreR>1){
        const g1=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
        g1.addColorStop(0,'rgba(255,255,200,0.98)');
        g1.addColorStop(0.3,'rgba(255,180,30,0.9)');
        g1.addColorStop(0.65,'rgba(255,80,0,0.7)');
        g1.addColorStop(1,'rgba(80,10,0,0)');
        ctx.globalAlpha=Math.max(0,1-prog*1.3);
        ctx.fillStyle=g1; ctx.beginPath();ctx.arc(cx,cy,coreR,0,Math.PI*2);ctx.fill();
        if(prog<0.12){
          ctx.globalAlpha=(0.12-prog)/0.12*0.95;
          ctx.fillStyle='#fff'; ctx.beginPath();ctx.arc(cx,cy,coreR*0.4,0,Math.PI*2);ctx.fill();
        }
      }
      // Onda de choque
      const shockR=ex.radius*Math.min(1,ex.t/(ex.duration*0.55));
      const shockA=prog<0.55?0.55:Math.max(0,(1-prog)*1.3);
      if(shockA>0.02){
        ctx.globalAlpha=shockA*0.4;
        ctx.strokeStyle='#ffaa44'; ctx.lineWidth=6;
        ctx.shadowBlur=20; ctx.shadowColor='#ff6600';
        ctx.beginPath();ctx.arc(cx,cy,shockR,0,Math.PI*2);ctx.stroke();
        ctx.shadowBlur=0;
        ctx.globalAlpha=shockA*0.2;
        ctx.strokeStyle='#fff'; ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(cx,cy,shockR*0.82,0,Math.PI*2);ctx.stroke();
      }
      ctx.globalAlpha=1;
    }

    // Misil en vuelo
    if(this.missileObj && this.missileObj.alive){
      const m=this.missileObj;
      const BALL_R=7, MW=BALL_R*2, mH=MW*3.8;
      // Estela
      m.trail.forEach((pt,i)=>{
        const t=i/m.trail.length;
        ctx.globalAlpha=t*0.5;
        const rr=MW*0.38*t;
        const g=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,rr+0.5);
        g.addColorStop(0,'#ffcc44'); g.addColorStop(1,'rgba(255,80,0,0)');
        ctx.fillStyle=g; ctx.beginPath();ctx.arc(pt.x,pt.y,rr+0.5,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=1;
      ctx.save(); ctx.translate(m.x,m.y);
      ctx.shadowBlur=18; ctx.shadowColor='#ff4400';
      // Cuerpo
      const bg=ctx.createLinearGradient(-MW/2,0,MW/2,0);
      bg.addColorStop(0,'#555');bg.addColorStop(0.3,'#ddd');bg.addColorStop(0.65,'#bbb');bg.addColorStop(1,'#444');
      ctx.fillStyle=bg;
      ctx.beginPath();ctx.roundRect(-MW/2,-mH*0.55,MW,mH*0.55,2);ctx.fill();
      // Ojiva
      ctx.fillStyle='#cc2200';
      ctx.beginPath();ctx.moveTo(0,-mH*0.55-mH*0.32);ctx.lineTo(-MW/2,-mH*0.55);ctx.lineTo(MW/2,-mH*0.55);ctx.closePath();ctx.fill();
      // Franja
      ctx.fillStyle='rgba(220,0,0,0.65)';ctx.fillRect(-MW/2,-mH*0.33,MW,mH*0.075);
      // Aletas
      ctx.fillStyle='#777';
      ctx.beginPath();ctx.moveTo(-MW/2,0);ctx.lineTo(-MW*1.15,mH*0.14);ctx.lineTo(-MW*1.05,mH*0.02);ctx.lineTo(-MW/2,-mH*0.2);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(MW/2,0);ctx.lineTo(MW*1.15,mH*0.14);ctx.lineTo(MW*1.05,mH*0.02);ctx.lineTo(MW/2,-mH*0.2);ctx.closePath();ctx.fill();
      // Tobera
      ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.ellipse(0,0,MW*0.42,MW*0.25,0,0,Math.PI*2);ctx.fill();
      // Llama
      const flk=0.72+0.28*Math.sin(Date.now()*0.06);
      const fg=ctx.createRadialGradient(0,mH*0.1*flk,0,0,mH*0.15*flk,MW*0.65*flk);
      fg.addColorStop(0,'rgba(255,255,190,1)');fg.addColorStop(0.35,'rgba(255,130,0,0.9)');fg.addColorStop(1,'rgba(200,0,0,0)');
      ctx.globalAlpha=0.95; ctx.fillStyle=fg;
      ctx.shadowColor='#ff6600'; ctx.shadowBlur=20;
      ctx.beginPath();ctx.ellipse(0,mH*0.1*flk,MW*0.32,mH*0.24*flk,0,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0; ctx.restore(); ctx.globalAlpha=1;
    }

    const pg=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.h);
    pg.addColorStop(0,'#88ffff');pg.addColorStop(1,'#00b8cc');
    ctx.shadowBlur=16;ctx.shadowColor='#00f5ff';
    ctx.fillStyle=pg;
    ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,paddle.h/2);ctx.fill();
    if(this.laserActive){
      ctx.fillStyle='#00f5ff';
      ctx.shadowColor='#00f5ff';ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(paddle.x+5,paddle.y+2,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(paddle.x+paddle.w-5,paddle.y+2,4,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#00f5ff';ctx.font='bold 11px Orbitron,monospace';
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText('⚡'+this.laserShots, paddle.x+paddle.w/2, paddle.y-20);
    }
    // Pico central del misil
    if(this.missileQueue>0 || this.missileActive){
      const pikX=paddle.x+paddle.w/2;
      ctx.shadowColor='#88ffff'; ctx.shadowBlur=14;
      ctx.fillStyle='#88ffff';
      ctx.beginPath();
      ctx.moveTo(pikX, paddle.y-9);
      ctx.lineTo(pikX-5, paddle.y);
      ctx.lineTo(pikX+5, paddle.y);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
      if(this.missileQueue>0){
        ctx.fillStyle='#88ffff'; ctx.font='bold 11px Orbitron,monospace';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText('×'+this.missileQueue, pikX, paddle.y-10);
      }
    }
    ctx.shadowBlur=0;

    this.balls.forEach(b=>b.draw(ctx));
    this.particles.forEach(p=>p.draw(ctx));

    if(this.balls.some(b=>b.stuck)){
      ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()*0.005);
      ctx.fillStyle='#00f5ff';ctx.font='bold 11px Orbitron,monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('TOCA PARA LANZAR',W/2,H*0.72);
      ctx.globalAlpha=1;
    }
  }

  updateHUD(){
    document.getElementById('score-val').textContent = this.score;
    document.getElementById('level-val').textContent = this.level;
    const livesCount = Math.min(this.lives, 10);
    document.getElementById('lives-val').textContent = '❤'.repeat(livesCount);
  }

  showMsg(text,color='#00f5ff'){
    const el=document.getElementById('msg');
    el.textContent=text;el.style.color=color;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1200);
  }
}

let game=null;
let animId=null;

function loop(){
  animId=requestAnimationFrame(loop);
  if(!game) return;
  const spd=7;
  if(game.state==='playing'){
    if(keysHeld['ArrowLeft']||keysHeld['a']||keysHeld['A']){
      game.paddle.x=Math.max(0, game.paddle.x-spd);
      game.balls.forEach(b=>{if(b.stuck) b.x=game.paddle.x+game.paddle.w/2;});
    }
    if(keysHeld['ArrowRight']||keysHeld['d']||keysHeld['D']){
      game.paddle.x=Math.min(game.W-game.paddle.w, game.paddle.x+spd);
      game.balls.forEach(b=>{if(b.stuck) b.x=game.paddle.x+game.paddle.w/2;});
    }
  }
  game.update();
  game.draw();
  if(game.state==='over'){
    document.getElementById('final-score').textContent='SCORE: '+game.score;
    document.getElementById('ov-over').classList.remove('hidden');
    cancelAnimationFrame(animId);
  }
  if(game.state==='won'){
    document.getElementById('win-score').textContent='SCORE: '+game.score;
    document.getElementById('ov-win').classList.remove('hidden');
    cancelAnimationFrame(animId);
  }
}

function startGame(level=1, score=0, lives=3){
  document.getElementById('ov-start').classList.add('hidden');
  document.getElementById('ov-over').classList.add('hidden');
  document.getElementById('ov-win').classList.add('hidden');
  cancelAnimationFrame(animId);
  resize();
  game=new Game();
  game.level=level; game.score=score; game.lives=lives;
  game.initLevel();
  game.updateHUD();
  loop();
}

document.getElementById('btn-start').addEventListener('click',()=>startGame(1,0,3));
document.getElementById('btn-restart').addEventListener('click',()=>startGame(1,0,3));
document.getElementById('btn-next').addEventListener('click',()=>{
  const l=game?game.level+1:1;
  const s=game?game.score:0;
  startGame(l,s,game?game.lives:1);
});

canvas.addEventListener('pointerdown', (e) => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('pointermove', (e) => {
  e.preventDefault();
  if(game && game.state === 'playing') { game.onPointerMove(e.clientX); }
}, { passive: false });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if(game) game.onTap(); }, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(game) game.onPointerMove(e.touches[0].clientX); }, {passive: false});
canvas.addEventListener('mousemove', e => { if(game) game.onPointerMove(e.clientX); });
canvas.addEventListener('click', e => { if(game) game.onTap(); });

const keysHeld={};
document.addEventListener('keydown', e => {
  keysHeld[e.key]=true;
  if(e.key===' '){e.preventDefault();if(game&&game.state==='playing') game.onTap();}
});
document.addEventListener('keyup', e => { keysHeld[e.key]=false; });

resize();
</script>
